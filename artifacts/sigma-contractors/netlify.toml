[build]
  command = "pnpm --filter @workspace/sigma-contractors build"
  publish = "artifacts/sigma-contractors/dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://simgaconstruction-production.up.railway.app/api/:splat"
  status = 200
  force = true

# Handle SPA routing for the frontend
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
