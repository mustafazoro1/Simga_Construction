[build]
  command = "npm run build"
  publish = "dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://exciting-exploration-production.up.railway.app/api/:splat"
  status = 200
  force = true

# Handle SPA routing for the frontend
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
