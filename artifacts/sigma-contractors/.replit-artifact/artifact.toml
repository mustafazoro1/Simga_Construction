kind = "web"
previewPath = "/"
title = "Sigma Contractors"
version = "1.0.0"
id = "artifacts/sigma-contractors"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23273

[services.development]
run = "pnpm --filter @workspace/sigma-contractors run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sigma-contractors", "run", "build" ]
publicDir = "artifacts/sigma-contractors/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23273"
BASE_PATH = "/"
